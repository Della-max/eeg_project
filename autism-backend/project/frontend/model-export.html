<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>掬星平台 - 双模态数据导出（建模专用）</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei"; }
        .container { width: 600px; margin:50px auto; padding:30px; box-shadow:0 2px 15px rgba(0,0,0,0.1); border-radius:8px; }
        h2 { color:#333; margin-bottom:20px; }
        .form-item { margin:15px 0; }
        label { display:block; margin-bottom:8px; color:#666; }
        input { width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; }
        .format-select { display:flex; gap:10px; margin:10px 0; }
        .format-select label { display:flex; align-items:center; gap:5px; }
        button { 
            width:100%; padding:12px; background:#409eff; color:#fff; 
            border:none; border-radius:4px; cursor:pointer; font-size:16px;
            margin-top:10px;
        }
        button:hover { background:#337ecc; }
        #message { margin-top:20px; padding:10px; border-radius:4px; display:none; }
        .success { display:block; background:#f0f9eb; color:#67c23a; }
        .error { display:block; background:#fef0f0; color:#f56c6c; }
        .label-mapping { margin-top:20px; padding:10px; background:#f5f7fa; border-radius:4px; }
        .label-mapping h4 { margin-bottom:8px; color:#333; }
        .label-mapping ul { padding-left:20px; color:#666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>双模态数据导出（行为+EEG）</h2>
        
        <div class="form-item">
            <label for="child_id">儿童ID（必填）</label>
            <input type="text" id="child_id" placeholder="如 C001" value="C001">
        </div>

        <div class="form-item">
            <label>导出格式</label>
            <div class="format-select">
                <label><input type="radio" name="format" value="json" checked> JSON格式（推荐建模）</label>
                <label><input type="radio" name="format" value="csv"> CSV格式（Excel可打开）</label>
            </div>
        </div>

        <button onclick="exportData()">导出数据</button>
        <div id="message"></div>

        <!-- 标签编码映射说明 -->
        <div class="label-mapping">
            <h4>行为标签数值编码映射</h4>
            <ul>
                <li>0 - 专注</li>
                <li>1 - 被动走神</li>
                <li>2 - 主动发起</li>
                <li>3 - 社交回避</li>
                <li>4 - 平稳</li>
                <li>5 - 烦躁</li>
            </ul>
        </div>
    </div>

    <script>
        async function exportData() {
            const child_id = document.getElementById('child_id').value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            const message = document.getElementById('message');

            // 前置校验
            if (!child_id) {
                message.className = 'error';
                message.textContent = '请输入儿童ID！';
                return;
            }

            // 清空提示，显示加载状态
            message.className = '';
            message.textContent = '正在导出数据，请稍候...';
            message.style.display = 'block';

            try {
                // 调用导出接口
                const response = await fetch(`http://localhost:3000/api/model/export-data?child_id=${child_id}&format=${format}`);
                const result = response.headers.get('Content-Type').includes('json') 
                    ? await response.json() 
                    : { success: true }; // CSV格式无JSON返回

                if (result.success) {
                    if (format === 'json') {
                        // JSON格式：展示数据并提供复制/下载
                        message.className = 'success';
                        message.textContent = result.message + '（数据已在控制台打印，可F12查看）';
                        console.log('双模态建模数据：', result.data);
                        console.log('标签映射：', result.label_mapping);
                        
                        // 可选：生成JSON文件下载
                        const blob = new Blob([JSON.stringify(result.data, null, 2)], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `child_${child_id}_bimodal_data.json`;
                        a.click();
                        URL.revokeObjectURL(url);
                    } else {
                        // CSV格式：直接触发下载
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `child_${child_id}_bimodal_data.csv`;
                        a.click();
                        URL.revokeObjectURL(url);

                        message.className = 'success';
                        message.textContent = 'CSV数据导出成功！文件已开始下载';
                    }
                } else {
                    message.className = 'error';
                    message.textContent = `导出失败：${result.message}`;
                }
            } catch (err) {
                message.className = 'error';
                message.textContent = `网络错误：${err.message}，请检查后端是否启动`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>录音管理</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background-color: #f5f5f5; font-family: Arial, sans-serif;}
        .container {max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        .container h2 {text-align: center; margin-bottom: 30px; color: #333;}
        .recording-section {margin-bottom: 40px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;}
        .recording-section h3 {margin-bottom: 20px; color: #555;}
        .btn-group {margin-bottom: 20px;}
        .btn {padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 10px;}
        .btn-start {background: #28a745; color: white;}
        .btn-stop {background: #dc3545; color: white;}
        .btn-save {background: #007bff; color: white;}
        .audio-list {margin-top: 30px;}
        .audio-item {padding: 15px; border-bottom: 1px solid #eee;}
        .audio-item:hover {background: #f9f9f9;}
        .audio-item .info {display: flex; justify-content: space-between; align-items: center;}
        .audio-item .date {font-size: 12px; color: #999;}
        .audio-item audio {margin-top: 10px; width: 100%;}
        .btn-group-bottom {margin-top: 30px; text-align: center;}
        .btn-back {background: #6c757d; color: white;}
        .btn-logout {background: #dc3545; color: white;}
        #message {margin-top: 10px; color: green;}
    </style>
</head>
<body>
    <div class="container">
        <h2>录音管理 - {{username}}</h2>
        
        <!-- 录音功能 -->
        <div class="recording-section">
            <h3>开始录音</h3>
            <div class="btn-group">
                <button id="start" class="btn btn-start">开始录音</button>
                <button id="stop" class="btn btn-stop" disabled>停止录音</button>
                <button id="save" class="btn btn-save" disabled>保存录音</button>
            </div>
            <br>
            <audio controls id="audio"></audio>
            <div id="message"></div>
        </div>
        
        <!-- 录音列表 -->
        <div class="audio-list">
            <h3>我的录音</h3>
            {% if recordings %}
                {% for recording in recordings %}
                <div class="audio-item">
                    <div class="info">
                        <span>{{ recording.filename }}</span>
                        <span class="date">{{ recording.record_time }}</span>
                    </div>
                    <audio controls src="/uploads/{{ recording.file_path }}"></audio>
                </div>
                {% endfor %}
            {% else %}
                <p>暂无录音</p>
            {% endif %}
        </div>
        
        <div class="btn-group-bottom">
            <a href="/login" class="btn btn-back">返回个人中心</a>
            <a href="/" class="btn btn-logout">退出登录</a>
        </div>
    </div>
    
    <script>
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const saveBtn = document.getElementById('save');
        const audio = document.getElementById('audio');
        const message = document.getElementById('message');

        let mediaRecorder;
        let audioChunks = [];

        startBtn.addEventListener('click', async () => {
            // 获取麦克风权限
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();

            startBtn.disabled = true;
            stopBtn.disabled = false;
            saveBtn.disabled = true;
            message.textContent = '';

            // 收集音频数据
            mediaRecorder.addEventListener('dataavailable', e => {
                audioChunks.push(e.data);
            });
        });

        stopBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            saveBtn.disabled = false;

            // 录制结束，生成音频并播放
            mediaRecorder.addEventListener('stop', () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(blob);
                audio.src = audioUrl;
            });
        });

        saveBtn.addEventListener('click', async () => {
            const blob = new Blob(audioChunks, { type: 'audio/wav' });
            const formData = new FormData();
            formData.append('audio', blob, 'recording.wav');
            
            try {
                const response = await fetch('/api/recording/save', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if (result.success) {
                    message.textContent = '录音保存成功！';
                    // 刷新页面以显示新录音
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    message.textContent = '保存失败：' + result.message;
                }
            } catch (error) {
                message.textContent = '保存失败：' + error.message;
            }
        });
    </script>
</body>
</html>

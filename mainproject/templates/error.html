<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>错误提示</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background-color: #f5f5f5; font-family: Arial, sans-serif;}
        .error-box {width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        .error-box h2 {text-align: center; margin-bottom: 20px; color: #dc3545;}
        .error-message {margin-bottom: 30px; padding: 15px; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px; color: #721c24;}
        .btn-group {text-align: center;}
        .btn {padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none;}
        .btn-back {background: #6c757d; color: white;}
    </style>
</head>
<body>
    <div class="error-box">
        <h2>错误提示</h2>
        <div class="error-message">{{ error }}</div>
        <div class="btn-group">
            <a href="/" class="btn btn-back">返回登录</a>
        </div>
    </div>
</body>
</html>

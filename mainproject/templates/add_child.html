<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加儿童</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background-color: #f5f5f5; font-family: Arial, sans-serif;}
        .container {max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        .container h2 {text-align: center; margin-bottom: 30px; color: #333;}
        .form-item {margin-bottom: 20px;}
        .form-item label {display: block; margin-bottom: 5px; color: #666; font-weight: bold;}
        .form-item input, .form-item select {width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;}
        .btn-group {margin-top: 30px; text-align: center;}
        .btn {padding: 10px 30px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin: 0 10px;}
        .btn-submit {background: #28a745; color: white;}
        .btn-cancel {background: #6c757d; color: white;}
        #message {margin-top: 20px; padding: 10px; border-radius: 4px; text-align: center;}
        .success {background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
        .error {background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}
    </style>
</head>
<body>
    <div class="container">
        <h2>添加儿童 - {{username}}</h2>
        
        <form id="addChildForm">
            {% if role == 3 %}
            <!-- 家长添加儿童 -->
            <div class="form-item">
                <label>儿童姓名</label>
                <input type="text" name="child_name" required placeholder="请输入儿童姓名">
            </div>
            <div class="form-item">
                <label>身份证号</label>
                <input type="text" name="id_card" required placeholder="请输入儿童身份证号">
            </div>
            <div class="form-item">
                <label>性别</label>
                <select name="gender" required>
                    <option value="1">男</option>
                    <option value="0">女</option>
                </select>
            </div>
            <div class="form-item">
                <label>年龄</label>
                <input type="number" name="age" required placeholder="请输入儿童年龄">
            </div>
            <div class="form-item">
                <label>自闭症等级</label>
                <select name="autism_level" required>
                    <option value="轻度">轻度</option>
                    <option value="中度">中度</option>
                    <option value="重度">重度</option>
                </select>
            </div>
            {% else %}
            <!-- 教育者和研究者添加负责的儿童 -->
            <div class="form-item">
                <label>儿童身份证号</label>
                <input type="text" name="id_card" required placeholder="请输入儿童身份证号">
            </div>
            <div class="form-item">
                <label>儿童姓名</label>
                <input type="text" name="child_name" required placeholder="请输入儿童姓名">
            </div>
            {% endif %}
            
            <div class="btn-group">
                <button type="submit" class="btn btn-submit">添加</button>
                <a href="/children" class="btn btn-cancel">取消</a>
            </div>
        </form>
        
        <div id="message"></div>
    </div>
    
    <script>
        document.getElementById('addChildForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/children/add', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if (result.success) {
                    messageDiv.className = 'success';
                    messageDiv.textContent = result.message;
                    setTimeout(() => {
                        window.location.href = '/children';
                    }, 1000);
                } else {
                    messageDiv.className = 'error';
                    messageDiv.textContent = result.message;
                }
            } catch (error) {
                messageDiv.className = 'error';
                messageDiv.textContent = '添加失败：' + error.message;
            }
        });
    </script>
</body>
</html>

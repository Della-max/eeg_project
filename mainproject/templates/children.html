<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>儿童管理</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background-color: #f5f5f5; font-family: Arial, sans-serif;}
        .container {max-width: 1000px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        .container h2 {text-align: center; margin-bottom: 30px; color: #333;}
        .btn-group {margin-bottom: 30px; text-align: right;}
        .btn {padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block;}
        .btn-add {background: #28a745; color: white;}
        .btn-back {background: #6c757d; color: white; margin-left: 10px;}
        .table-container {overflow-x: auto;}
        table {width: 100%; border-collapse: collapse;}
        th, td {padding: 12px; text-align: left; border-bottom: 1px solid #ddd;}
        th {background-color: #f2f2f2; font-weight: bold;}
        tr:hover {background-color: #f5f5f5;}
        .empty-message {text-align: center; padding: 50px; color: #999;}
    </style>
</head>
<body>
    <div class="container">
        <h2>儿童管理 - {{username}}</h2>
        
        <div class="btn-group">
            <a href="/children/add" class="btn btn-add">添加儿童</a>
            <a href="/login" class="btn btn-back">返回个人中心</a>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>姓名</th>
                        <th>身份证号</th>
                        <th>性别</th>
                        <th>年龄</th>
                        <th>自闭症等级</th>
                        <th>添加时间</th>
                    </tr>
                </thead>
                <tbody>
                    {% if children %}
                        {% for child in children %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ child.name }}</td>
                            <td>{{ child.id_card }}</td>
                            <td>{{ child.gender }}</td>
                            <td>{{ child.age }}</td>
                            <td>{{ child.autism_level }}</td>
                            <td>{{ child.create_time }}</td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="7" class="empty-message">暂无儿童信息</td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
